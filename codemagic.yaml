workflows:
  ios-app:
    name: TodoNotes iOS
    max_build_duration: 60
    environment:
      xcode: latest
      node: 18
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build web assets
        script: |
          npm run build
      - name: Copy to iOS
        script: |
          npx cap copy ios
      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install
      - name: Build iOS
        script: |
          xcode-project build-ipa --workspace ios/App/App.xcworkspace --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
      - ios/App/App.xcarchive
    publishing:
      email:
        recipients:
          - marvin@example.com
